$kind: http-request
name: Get Profile Stats
method: GET
url: '{{base_url}}/api/auth/profile/stats'
order: 4000
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 2xx", function () {
        pm.response.to.be.success;
      });
      pm.test("Response is JSON", function () {
        pm.response.to.be.json;
      });

$kind: http-request
name: 'Admin - Review Role Request'
method: PATCH
url: '{{base_url}}/api/auth/admin/role-requests/{{role_request_id}}/review'
order: 16000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "status": "approved",
      "admin_note": "Verified field ownership documents."
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 2xx", function () {
        pm.response.to.be.success;
      });
      pm.test("Response is JSON", function () {
        pm.response.to.be.json;
      });

$kind: http-request
name: Request Password Reset Link
method: POST
url: '{{base_url}}/api/auth/forgot-password-link'
order: 4000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "identifier": "kanasaga123@gmail.com"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 2xx", function () {
        pm.response.to.be.success;
      });
      pm.test("Response is JSON", function () {
        pm.response.to.be.json;
      });
      if (pm.response.code === 200) {
        const json = pm.response.json();
        if (json.resetLink) {
          const url = new URL(json.resetLink);
          const token = url.searchParams.get("token");
          if (token) {
            pm.environment.set("reset_token", token);
            console.log("reset_token saved:", token.substring(0, 20) + "...");
          }
        }
      }
$kind: http-request
name: Update Profile
method: PUT
url: '{{base_url}}/api/auth/profile'
order: 5000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "first_name": "John",
      "last_name": "Doe",
      "phone": "0812345678",
      "bio": "Football enthusiast"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 2xx", function () {
        pm.response.to.be.success;
      });
      pm.test("Response is JSON", function () {
        pm.response.to.be.json;
      });

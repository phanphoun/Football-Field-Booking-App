$kind: http-request
name: Delete Avatar
method: DELETE
url: '{{base_url}}/api/auth/profile/avatar'
order: 11000
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 2xx", function () {
        pm.response.to.be.success;
      });
      pm.test("Response is JSON", function () {
        pm.response.to.be.json;
      });

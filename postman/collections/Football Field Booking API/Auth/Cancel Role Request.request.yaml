$kind: http-request
name: Cancel Role Request
method: DELETE
url: '{{base_url}}/api/auth/role-requests/{{role_request_id}}'
order: 13000
pathVariables:
  - key: role_request_id
    value: '{{role_request_id}}'
    description: ID of the role request to cancel
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 2xx", function () {
        pm.response.to.be.success;
      });
      pm.test("Response is JSON", function () {
        pm.response.to.be.json;
      });

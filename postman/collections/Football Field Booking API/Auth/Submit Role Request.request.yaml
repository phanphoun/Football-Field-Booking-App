$kind: http-request
name: Submit Role Request
method: POST
url: '{{base_url}}/api/auth/role-requests'
order: 12000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "requested_role": "field_owner",
      "reason": "I own a football field and want to list it on the platform."
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 2xx", function () {
        pm.response.to.be.success;
      });
      pm.test("Response is JSON", function () {
        pm.response.to.be.json;
      });

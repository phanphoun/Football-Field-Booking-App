$kind: http-request
name: Get Public Schedule
method: GET
url: '{{base_url}}/api/public/schedule'
order: 4000
queryParams:
  - key: date
    value: '2025-01-15'
    description: Date to view schedule for (YYYY-MM-DD)
  - key: field_id
    value: '{{field_id}}'
    description: Filter by specific field
    disabled: true
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 2xx", function () {
        pm.response.to.be.success;
      });
      pm.test("Response is JSON", function () {
        pm.response.to.be.json;
      });

$kind: http-request
name: Respond to Team Join Request
method: PATCH
url: '{{base_url}}/api/teams/{{team_id}}/join-requests/{{join_request_id}}'
order: 14000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "status": "accepted"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 2xx", function () {
        pm.response.to.be.success;
      });
      pm.test("Response is JSON", function () {
        pm.response.to.be.json;
      });

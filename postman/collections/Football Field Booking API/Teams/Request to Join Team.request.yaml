$kind: http-request
name: Request to Join Team
method: POST
url: '{{base_url}}/api/teams/{{team_id}}/join-requests'
order: 13000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "message": "I would like to join your team as a midfielder."
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 2xx", function () {
        pm.response.to.be.success;
      });
      pm.test("Response is JSON", function () {
        pm.response.to.be.json;
      });

$kind: http-request
name: Create Team
method: POST
url: '{{base_url}}/api/teams'
order: 2000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "Thunder FC",
      "description": "A competitive football team looking for matches.",
      "home_field_id": "{{field_id}}"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 2xx", function () {
        pm.response.to.be.success;
      });
      pm.test("Response is JSON", function () {
        pm.response.to.be.json;
      });
      if (pm.response.code === 201) {
        const json = pm.response.json();
        if (json.data && json.data.id) {
          pm.collectionVariables.set("team_id", json.data.id);
        }
      }

$kind: http-request
name: Update Team
method: PUT
url: '{{base_url}}/api/teams/{{team_id}}'
order: 4000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "Thunder FC Updated",
      "description": "Updated team description with new goals.",
      "home_field_id": "{{field_id}}"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 2xx", function () {
        pm.response.to.be.success;
      });
      pm.test("Response is JSON", function () {
        pm.response.to.be.json;
      });

$kind: http-request
name: Remove Team Member
method: DELETE
url: '{{base_url}}/api/teams/{{team_id}}/members/{{member_id}}'
order: 8000
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 2xx", function () {
        pm.response.to.be.success;
      });

$kind: http-request
name: Get Team Match History
method: GET
url: '{{base_url}}/api/teams/{{team_id}}/match-history'
order: 18000
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 2xx", function () {
        pm.response.to.be.success;
      });
      pm.test("Response is JSON", function () {
        pm.response.to.be.json;
      });

$kind: http-request
name: Get Field by ID
method: GET
url: '{{base_url}}/api/fields/{{field_id}}'
order: 3000
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 2xx", function () {
        pm.response.to.be.success;
      });
      pm.test("Response is JSON", function () {
        pm.response.to.be.json;
      });
      pm.test("Has field id", function () {
        const json = pm.response.json();
        const field = json.data || json.field || json;
        pm.expect(field).to.have.property("id");
      });

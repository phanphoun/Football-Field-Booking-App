$kind: http-request
name: Delete Field Image
method: DELETE
url: '{{base_url}}/api/fields/{{field_id}}/images/{{image_id}}'
order: 8000
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 2xx", function () {
        pm.response.to.be.success;
      });

$kind: http-request
name: Update Team Member Role
method: PUT
url: '{{base_url}}/api/team-members/{{member_id}}/role'
order: 5000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "role": "co-captain"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 2xx", function () {
        pm.response.to.be.success;
      });
      pm.test("Response is JSON", function () {
        pm.response.to.be.json;
      });

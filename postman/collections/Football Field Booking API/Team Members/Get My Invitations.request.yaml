$kind: http-request
name: Get My Invitations
method: GET
url: '{{base_url}}/api/team-members/invitations/mine'
order: 2000
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 2xx", function () {
        pm.response.to.be.success;
      });
      pm.test("Response is JSON", function () {
        pm.response.to.be.json;
      });

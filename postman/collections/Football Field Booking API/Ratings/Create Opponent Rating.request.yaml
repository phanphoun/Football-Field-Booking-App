$kind: http-request
name: Create Opponent Rating
method: POST
url: '{{base_url}}/api/ratings/opponent'
order: 5000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "booking_id": "{{booking_id}}",
      "opponent_team_id": "{{opponent_team_id}}",
      "score": 4,
      "sportsmanship": 5,
      "comment": "Fair and competitive opponent team."
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 2xx", function () {
        pm.response.to.be.success;
      });
      pm.test("Response is JSON", function () {
        pm.response.to.be.json;
      });

$kind: http-request
name: Get Match Result by ID
method: GET
url: '{{base_url}}/api/match-results/{{match_result_id}}'
order: 2000
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 2xx", function () {
        pm.response.to.be.success;
      });
      pm.test("Response is JSON", function () {
        pm.response.to.be.json;
      });

$kind: http-request
name: Get All Match Results
method: GET
url: '{{base_url}}/api/match-results'
order: 1000
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 2xx", function () {
        pm.response.to.be.success;
      });
      pm.test("Response is JSON", function () {
        pm.response.to.be.json;
      });

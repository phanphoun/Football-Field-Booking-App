$kind: http-request
name: Get Booking by ID
method: GET
url: '{{base_url}}/api/bookings/{{booking_id}}'
order: 7000
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 2xx", function () {
        pm.response.to.be.success;
      });
      pm.test("Response is JSON", function () {
        pm.response.to.be.json;
      });
      pm.test("Has booking id", function () {
        const json = pm.response.json();
        const booking = json.data || json.booking || json;
        pm.expect(booking).to.have.property("id");
      });

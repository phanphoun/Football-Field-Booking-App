$kind: http-request
name: Request to Join Match
method: POST
url: '{{base_url}}/api/bookings/{{booking_id}}/join-requests'
order: 11000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "team_id": "{{team_id}}",
      "message": "We would like to challenge your team!"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 2xx", function () {
        pm.response.to.be.success;
      });
      pm.test("Response is JSON", function () {
        pm.response.to.be.json;
      });

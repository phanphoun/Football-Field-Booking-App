$kind: http-request
name: Toggle Open for Opponents
method: PATCH
url: '{{base_url}}/api/bookings/{{booking_id}}/open-for-opponents'
order: 10000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "open_for_opponents": true
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 2xx", function () {
        pm.response.to.be.success;
      });
      pm.test("Response is JSON", function () {
        pm.response.to.be.json;
      });
